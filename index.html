<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leakbridge 9702 - Precision Mode</title>
  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --warn: #facc15; --text: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 450px; }

    #media-box { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
    video, canvas { width: 100%; height: 100%; object-fit: cover; }
    
    #overlay { 
      position: absolute; top:0; left:0; width:100%; height:100%; 
      background: rgba(15, 23, 42, 0.9); display: none; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 50;
    }
    .progress-wrap { width: 70%; height: 6px; background: #334155; border-radius: 10px; margin-top: 15px; overflow: hidden; }
    #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
    .btn { padding: 12px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
    .btn-main { background: var(--accent); color: #000; grid-column: span 2; font-size: 1rem; }
    .btn-sub { background: #334155; color: white; }
    .btn-stop { background: #7f1d1d; color: white; }

    #log { font-size: 0.75rem; color: #94a3b8; text-align: center; margin-bottom: 10px; height: 1rem; }
    .viewer-wrap { display: none; width: 100%; margin-top: 10px; }
    iframe { width: 100%; height: 600px; border-radius: 10px; background: white; border: none; }
  </style>
</head>
<body>

<div class="container">
  <div id="media-box">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="overlay">
      <div id="status-txt" style="font-weight:700; color:var(--accent);">INITIALIZING...</div>
      <div class="progress-wrap"><div id="progress-fill"></div></div>
    </div>
  </div>

  <div id="log">Ready to Scan</div>

  <div class="btn-grid">
    <button class="btn btn-main" onclick="doCapture()">CAPTURE & ANALYZE</button>
    <label class="btn btn-sub" style="text-align:center; cursor:pointer;">UPLOAD<input type="file" hidden onchange="doUpload(event)"></label>
    <button class="btn btn-sub" onclick="initCam()">START CAM</button>
    <button class="btn btn-stop" onclick="stopCam()">STOP CAM</button>
  </div>

  <div class="viewer-wrap" id="viewer-wrap">
    <div id="info-bar" style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.8rem; font-weight:600;">
        <span id="paper-id" style="color:var(--accent);"></span>
        <span id="page-id"></span>
    </div>
    <iframe id="pdf-view"></iframe>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
  
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const overlay = document.getElementById('overlay');
  const prog = document.getElementById('progress-fill');
  
  let stream = null;
  let ocrWorker = null;
  let state = { sub: '9702', seas: '', yr: '', pap: '', q: '', words: [] };

  // --- 1. INITIALIZATION ---
  async function initWorker() {
    if (!ocrWorker) {
      ocrWorker = await Tesseract.createWorker('eng');
    }
  }

  async function initCam() {
    try {
      await initWorker();
      if(stream) stopCam();
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280 } });
      video.srcObject = stream;
      video.style.display = 'block'; canvas.style.display = 'none';
      document.getElementById('log').innerText = "Camera Active";
    } catch(e) { document.getElementById('log').innerText = "Camera Access Denied"; }
  }
  initCam();

  function stopCam() {
    if(stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.style.display = 'none';
    document.getElementById('log').innerText = "Camera Stopped";
  }

  // --- 2. PIPELINE ---
  function doUpload(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        video.style.display = 'none'; canvas.style.display = 'block';
        processPipeline();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
  }

  function doCapture() {
    if(!stream) return alert("Please start camera.");
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    video.style.display = 'none'; canvas.style.display = 'block';
    processPipeline();
  }

  async function processPipeline() {
  overlay.style.display = 'flex';
  updateProg(20, "OCR Scanning...");

  try {
    await initWorker();
    const { data: { text } } = await ocrWorker.recognize(canvas);
    
    // We normalize the text: Uppercase and remove spaces
    const clean = text.toUpperCase().replace(/\s+/g, '');

    // STEP 1: Identify the Cambridge Code
    // This regex looks for [F,M,S,W] followed by Year, Paper, and optional Question
    // It ignores everything before the Session letter (like "7." or "2.")
    const regex = /([FMSW])(\d{2})[\/\s-]?(\d{1,2})(?:[\/\s-]?Q(\d+))?/i;
    const match = clean.match(regex);

    if (match) {
      state.sub = "9702"; // Default for Physics, or add (\d{4}) if you want it dynamic
      state.seas = match[1].toLowerCase();
      state.yr = match[2];
      state.pap = match[3];
      state.q = match[4] || ""; // Extracted "2" from "Q2" in your image
      
      // We also grab long words for Step 2 fallback
      state.words = text.toLowerCase().match(/\b(\w{5,})\b/g) || [];
      
      runSearch();
    } else {
      throw new Error("Cambridge Code not found in image.");
    }
  } catch(e) {
    alert("Scan Failed: " + e.message);
    overlay.style.display = 'none';
  }
  }

  async function runSearch() {
    const { sub, seas, yr, pap, q, words } = state;
    const msUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_ms_${pap}.pdf`;
    const qpUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_qp_${pap}.pdf`;

    document.getElementById('viewer-wrap').style.display = 'block';
    document.getElementById('paper-id').innerText = `${sub} | ${seas.toUpperCase()}${yr} | P${pap}`;

    let targetQ = q;

    // STEP 2: Hunt for Question Number in QP if not in code
    if (!targetQ && words.length > 0) {
      updateProg(50, "Hunting Question #...");
      targetQ = await findQ(qpUrl, words);
    }

    // STEP 3: Identify Question in MS and find Page
    updateProg(80, "Indexing MS...");
    const page = await findPage(msUrl, targetQ || "1");

    updateProg(100, "Done!");
    setTimeout(() => {
      overlay.style.display = 'none';
      const viewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(msUrl)}&embedded=true#page=${page}`;
      document.getElementById('pdf-view').src = viewerUrl;
      document.getElementById('page-id').innerText = `Jumping to Q${targetQ || 1} (Page ${page})`;
    }, 600);
  }

  // --- 3. PDF SCANNERS ---
  async function findQ(url, words) {
    try {
      const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
      const pdf = await pdfjsLib.getDocument(proxy).promise;
      for (let i = 1; i <= Math.min(pdf.numPages, 20); i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const txt = content.items.map(s => s.str).join(' ').toLowerCase();
        if (words.slice(0, 3).every(w => txt.includes(w))) {
          const m = txt.match(/(?:^|\s)(\d+)\s*\./);
          return m ? m[1] : null;
        }
      }
    } catch(e) { return null; }
  }

  async function findPage(url, qNum) {
    try {
      const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
      const pdf = await pdfjsLib.getDocument(proxy).promise;
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const txt = content.items.map(s => s.str).join(' ');
        if (new RegExp(`\\b${qNum}\\b`).test(txt)) return i;
      }
    } catch(e) { return 1; }
    return 1;
  }

  function updateProg(pct, msg) {
    prog.style.width = pct + "%";
    document.getElementById('status-txt').innerText = msg;
  }
</script>
</body>
</html>
