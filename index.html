<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leakbridge - Resilient Proxy Engine</title>
  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --nav-btn: #334155; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 450px; }

    .settings-bar { width: 100%; background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-around; border: 1px solid rgba(255,255,255,0.05); }
    .input-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .settings-bar label { font-size: 0.7rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    .settings-bar input { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; text-align: center; font-weight: 600; outline: none; }
    #sub-input { width: 80px; }
    #q-input { width: 60px; }

    #media-box { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
    video, canvas { width: 100%; height: 100%; object-fit: cover; }
    
    #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(15, 23, 42, 0.96); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 50; }
    .progress-wrap { width: 70%; height: 6px; background: #334155; border-radius: 10px; margin-top: 15px; overflow: hidden; }
    #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .btn { padding: 14px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-main { background: var(--accent); color: #0f172a; grid-column: span 2; font-size: 1rem; }
    .btn-sub { background: #334155; color: white; font-size: 0.8rem; }

    #log { font-size: 0.8rem; color: #94a3b8; text-align: center; margin-bottom: 5px; }
    #debug-read { font-size: 0.6rem; color: #475569; text-align: center; margin-bottom: 10px; font-family: monospace; overflow: hidden; height: 12px; }
    
    /* Native Document Container UI */
    .viewer-wrap { display: none; width: 100%; margin-top: 10px; background: var(--card); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); padding: 12px; }
    #info-bar { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; margin-bottom: 10px; padding: 0 4px; }
    
    /* Horizontal Jump Bar */
    #pdf-nav-bar { width: 100%; display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; scroll-behavior: smooth; }
    #pdf-nav-bar::-webkit-scrollbar { height: 4px; }
    #pdf-nav-bar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    .nav-jump-btn { background: var(--nav-btn); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
    .nav-jump-btn.active { background: var(--accent); color: #0f172a; }

    /* Scrollable Container Track */
    #pdf-sections-track { width: 100%; display: flex; flex-direction: column; gap: 20px; max-height: 650px; overflow-y: auto; scroll-behavior: smooth; }
    .page-section { width: 100%; background: #0f172a; border-radius: 8px; padding: 6px; border: 1px solid rgba(255,255,255,0.08); position: relative; min-height: 300px; }
    .page-badge { position: absolute; top: 12px; left: 12px; background: rgba(15, 23, 42, 0.85); color: var(--accent); font-size: 0.65rem; font-weight: 700; padding: 4px 8px; border-radius: 4px; z-index: 10; border: 1px solid rgba(255,255,255,0.05); }
    .page-section canvas { width: 100%; height: auto; display: block; border-radius: 4px; background: white; image-rendering: -webkit-optimize-contrast; }
  </style>
</head>
<body>

<div class="container">
  <div class="settings-bar">
    <div class="input-group">
      <label>Subject</label>
      <input type="text" id="sub-input" placeholder="9702" value="9702" maxlength="4">
    </div>
    <div class="input-group">
      <label>Target Q#</label>
      <input type="text" id="q-input" placeholder="Auto" value="1" maxlength="2">
    </div>
  </div>

  <div id="media-box">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="overlay">
      <div id="status-txt" style="font-weight:700; color:var(--accent);">INITIALIZING...</div>
      <div class="progress-wrap"><div id="progress-fill"></div></div>
    </div>
  </div>

  <div id="log">Ready to Scan Paper</div>
  <div id="debug-read"></div>

  <div class="btn-grid">
    <button class="btn btn-main" onclick="doCapture()">CAPTURE & ANALYZE</button>
    <button class="btn btn-sub" onclick="initCam()">CAM ON</button>
    <label class="btn btn-sub" style="text-align:center; cursor:pointer;">UPLOAD<input type="file" hidden accept="image/*" onchange="doUpload(event)"></label>
  </div>

  <div class="viewer-wrap" id="viewer-wrap">
    <div id="info-bar">
        <span id="paper-id" style="color:var(--accent); font-weight:bold;"></span>
        <span id="match-status" style="font-size:0.75rem; color:#94a3b8;"></span>
    </div>
    <div id="pdf-nav-bar"></div>
    <div id="pdf-sections-track"></div>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
  
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const overlay = document.getElementById('overlay');
  const prog = document.getElementById('progress-fill');
  
  let ocrWorker = null;
  let state = {}; 

  async function setupOCR() {
    if (!ocrWorker) {
      ocrWorker = await Tesseract.createWorker();
      await ocrWorker.loadLanguage('eng');
      await ocrWorker.initialize('eng');
    }
  }
  setupOCR();

  async function initCam() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } });
      video.srcObject = stream;
      video.style.display = 'block'; canvas.style.display = 'none';
    } catch(e) { document.getElementById('log').innerText = "Static file-drop ready."; }
  }
  initCam();

  function processImage() {
    const ctx = canvas.getContext('2d');
    const scale = video.videoWidth > 1200 ? 1200 / video.videoWidth : 1;
    canvas.width = video.videoWidth * scale;
    canvas.height = video.videoHeight * scale;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    video.style.display = 'none'; canvas.style.display = 'block';
    processPipeline();
  }

  function doCapture() {
    if(video.videoWidth === 0) return alert("Camera feed warming up.");
    processImage();
  }

  function doUpload(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        video.style.display = 'none'; canvas.style.display = 'block';
        processPipeline();
      };
      img.src = ev.target.result;
    };
    if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
  }

  async function processPipeline() {
    overlay.style.display = 'flex';
    updateProg(15, "Acquiring Document References...");
    
    const manualSub = document.getElementById('sub-input').value || '9702';
    const manualQ = document.getElementById('q-input').value || '1'; 
    
    state = { sub: manualSub, seas: '', yr: '', pap: '', q: manualQ };

    try {
      await setupOCR();
      updateProg(40, "Running OCR Matrix...");
      const { data: { text } } = await ocrWorker.recognize(canvas);
      
      const clean = text.toUpperCase().replace(/\s+/g, '');
      document.getElementById('debug-read').innerText = "Matched Text: " + clean.substring(0, 35);

      const regex = /([FMSW]|MJ|ON|FM)(?:\/)?(\d{4}|\d{2})[\/|I1\s-]?(\d{1,2})(?:[\/|I1\s-]?Q(\d+))?/i;
      const match = clean.match(regex);

      if (!match) throw new Error("CIE Suffix Code unreadable. Manual input fallback active.");

      let rawSession = match[1];
      if (rawSession === "MJ" || rawSession === "J" || rawSession === "S") state.seas = "s";
      else if (rawSession === "ON" || rawSession === "W") state.seas = "w";
      else if (rawSession === "FM" || rawSession === "M" || rawSession === "F") state.seas = "m";
      else state.seas = rawSession.toLowerCase();

      let rawYear = match[2];
      state.yr = rawYear.length === 4 ? rawYear.substring(2) : rawYear;
      state.pap = match[3];
      
      if (match[4]) {
        state.q = match[4];
        document.getElementById('q-input').value = state.q; 
      }

      await runNativeRenderPipeline();
    } catch(err) {
      console.log(err.message);
      if(!state.seas) { state.seas = 's'; state.yr = '23'; state.pap = '21'; }
      await runNativeRenderPipeline();
    }
  }

  // --- NEW: Resilient Proxy Waterfall Function ---
  async function fetchPDFResilient(targetUrl) {
    const proxies = [
      `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
      `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
      `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`
    ];

    for (let i = 0; i < proxies.length; i++) {
      try {
        updateProg(50 + (i * 5), `Fetching via Node ${i + 1}...`);
        const task = pdfjsLib.getDocument(proxies[i]);
        const pdf = await task.promise;
        return pdf; // If successful, exit loop and return the document
      } catch (e) {
        console.warn(`Proxy ${i + 1} rejected. Trying next...`);
      }
    }
    throw new Error("All proxy nodes failed. Target server might be down or file doesn't exist.");
  }

  async function runNativeRenderPipeline() {
    const { sub, seas, yr, pap, q } = state;
    const targetQ = q || "1"; 
    
    const msUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_ms_${pap}.pdf`;

    document.getElementById('viewer-wrap').style.display = 'block';
    document.getElementById('paper-id').innerText = `${sub} | ${seas.toUpperCase()}${yr} | P${pap} | Q${targetQ}`;
    
    const navBar = document.getElementById('pdf-nav-bar');
    const track = document.getElementById('pdf-sections-track');
    
    navBar.innerHTML = '';
    track.innerHTML = ''; 

    updateProg(50, "Fetching PDF Assets...");
    
    try {
      // Use the new resilient fetcher instead of hardcoding one proxy
      const pdf = await fetchPDFResilient(msUrl);
      
      let matchedPage = 2; 
      let foundMatch = false;

      // STEP 1: FAST INDEXING DATA LOOP
      for (let i = 2; i <= pdf.numPages; i++) {
        if (foundMatch) break;
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        
        for (let item of content.items) {
          const itemX = item.transform[4];
          if (itemX < 100) { 
            const cleanedText = item.str.replace(/\D/g, '');
            if (cleanedText === targetQ) {
              matchedPage = i;
              foundMatch = true;
              break;
            }
          }
        }
      }

      // STEP 2: LAZY DOM VIEWPORT GENERATION
      for (let i = 1; i <= pdf.numPages; i++) {
        const navBtn = document.createElement('button');
        navBtn.className = 'nav-jump-btn' + (i === matchedPage ? ' active' : '');
        navBtn.id = `nav-btn-${i}`;
        navBtn.innerText = `Pg ${i}`;
        navBtn.onclick = () => jumpToSection(i);
        navBar.appendChild(navBtn);

        const section = document.createElement('div');
        section.id = `page-sec-${i}`;
        section.className = 'page-section';
        section.innerHTML = `<div class="page-badge">PAGE ${i}</div>`;
        
        const pageCanvas = document.createElement('canvas');
        section.appendChild(pageCanvas);
        track.appendChild(section);

        renderPageToCanvas(pdf, i, pageCanvas);
      }

      document.getElementById('match-status').innerText = `Jumped to target Page ${matchedPage}`;
      updateProg(100, "Sync Complete.");
      
      setTimeout(() => {
        overlay.style.display = 'none';
        jumpToSection(matchedPage);
      }, 200);

    } catch (err) {
      alert("Network Error: " + err.message);
      overlay.style.display = 'none';
    }
  }

  async function renderPageToCanvas(pdfInstance, pageNum, canvasElement) {
    try {
      const page = await pdfInstance.getPage(pageNum);
      const renderScale = window.devicePixelRatio || 2.0; 
      const viewport = page.getViewport({ scale: renderScale });
      const ctx = canvasElement.getContext('2d');
      
      canvasElement.height = viewport.height;
      canvasElement.width = viewport.width;

      await page.render({ canvasContext: ctx, viewport: viewport }).promise;
    } catch (e) { console.error("Deferred canvas generation failure:", e); }
  }

  function jumpToSection(pageIndex) {
    const targetSection = document.getElementById(`page-sec-${pageIndex}`);
    if (targetSection) {
      targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      
      document.querySelectorAll('.nav-jump-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById(`nav-btn-${pageIndex}`);
      if(activeBtn) {
        activeBtn.classList.add('active');
        activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
    }
  }

  function updateProg(pct, msg) {
    prog.style.width = pct + "%";
    document.getElementById('status-txt').innerText = msg;
  }
</script>
</body>
</html>
