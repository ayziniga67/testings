<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge Scanner Pro</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a2a3a;
      --card-bg: #004d4d;
      --text-main: #ffffff;
      --accent-teal: #006666;
      --progress-bg: #4a5a6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; letter-spacing: 2px; }

    #video-wrap {
      width: 100%;
      max-width: 340px;
      height: 200px;
      background: var(--card-bg);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
    }

    video { width: 100%; height: 100%; object-fit: cover; display: none; }
    #uploaded-img { width: 100%; height: 100%; object-fit: contain; display: none; }

    #aim-box {
      position: absolute;
      width: 80%;
      height: 50px;
      border: 2px solid #ffffff;
      border-radius: 10px;
      pointer-events: none;
      z-index: 5;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      width: 100%;
      max-width: 340px;
    }

    .btn-action {
      background: transparent;
      color: white;
      border: 1.5px solid #ffffff;
      padding: 12px 0;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      flex: 1;
      text-align: center;
      font-family: 'Outfit', sans-serif;
    }

    .output-section { width: 100%; max-width: 340px; }

    .section-group {
      background: rgba(0, 77, 77, 0.4);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      border-left: 4px solid #ffffff;
    }

    .section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
      margin-bottom: 10px;
      display: block;
    }

    .subject-sub {
      font-size: 0.8rem;
      opacity: 0.6;
      display: block;
      margin-bottom: 5px;
    }

    #result-text { font-size: 1.2rem; font-weight: 600; display: block; }

    .pdf-btn {
      display: none;
      background: #ffffff;
      color: #004d4d;
      padding: 12px;
      text-align: center;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      margin-top: 5px;
      transition: transform 0.2s;
    }
    .pdf-btn:active { transform: scale(0.98); }

    .progress-container { width: 100%; height: 3px; background: var(--progress-bg); margin-top: 10px; }
    #bar { height: 100%; background: #ffffff; width: 0%; transition: width 0.2s; }

    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CAMBRIGE IS GAY</h1>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <img id="uploaded-img">
    <div id="aim-box"></div>
  </div>

  <div class="action-row">
    <button class="btn-action" id="main-btn" onclick="handleFlow()">Scan</button>
    <button class="btn-action" onclick="handleManualPaste()">Paste</button>
  </div>

  <div class="output-section">
    <div class="section-group">
      <span class="section-title">For Rove</span>
      <span class="subject-sub" id="subject-display">Subject: ----</span>
      <span id="result-text">Output here</span>
    </div>

    <div class="section-group">
      <span class="section-title">For Papa Cambridge</span>
      <a id="pdf-link" class="pdf-btn" target="_blank">OPEN PDF</a>
    </div>

    <div class="progress-container"><div id="bar"></div></div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const uploadedImg = document.getElementById('uploaded-img');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultEl = document.getElementById('result-text');
    const subjectEl = document.getElementById('subject-display');
    const pdfLink = document.getElementById('pdf-link');
    const mainBtn = document.getElementById('main-btn');
    const bar = document.getElementById('bar');
    
    let stream = null, worker = null, isCameraOn = false, currentMode = 'camera';

    function parseCode(text) {
      const clean = text.toUpperCase().trim().replace(/[^A-Z0-9_]/g, ' ');
      
      let resText = "";
      let urlPart = "";
      let sub = "", pap = "", varnt = "", seas = "", yr = "", type = "ms"; // Defaulting to MS

      const mSlash = clean.match(/(\d{4})\s*(\d)\s*(\d)\s*([MFJON])\s*(\d{2})/);
      const mLegacy = clean.match(/(\d{4})\s*0(\d)\s*([MFJON])\s*(\d{2})/);
      const mUnder = clean.match(/(\d{4})_?([MSW])(\d{2})_(QP|MS)_(\d)(\d)/);

      if (mSlash) {
        sub = mSlash[1]; pap = mSlash[2]; varnt = mSlash[3]; yr = mSlash[5];
        let s = mSlash[4];
        seas = (s === 'M') ? 'm' : (s === 'J' ? 's' : 'w');
        let sName = (s === 'M') ? "March" : (s === 'J' ? "Summer" : "Winter");
        resText = `Paper ${pap} Variant ${varnt} ${sName} 20${yr}`;
        urlPart = `${sub}_${seas}${yr}_ms_${pap}${varnt}`; // Inserted MS automatically
      } 
      else if (mLegacy) {
        sub = mLegacy[1]; pap = mLegacy[2]; yr = mLegacy[4];
        let s = mLegacy[3];
        seas = (s === 'M') ? 'm' : (s === 'J' ? 's' : 'w');
        let sName = (s === 'M') ? "March" : (s === 'J' ? "Summer" : "Winter");
        resText = `Paper ${pap} ${sName} 20${yr}`;
        urlPart = `${sub}_${seas}${yr}_ms_0${pap}`; // Inserted MS automatically
      }
      else if (mUnder) {
        sub = mUnder[1]; seas = mUnder[2].toLowerCase(); yr = mUnder[3]; type = mUnder[4].toLowerCase(); pap = mUnder[5]; varnt = mUnder[6];
        let sName = (seas === 'm') ? "March" : (seas === 's' ? "Summer" : "Winter");
        resText = `Paper ${pap} Variant ${varnt} ${sName} 20${yr}`;
        urlPart = `${sub}_${seas}${yr}_${type}_${pap}${varnt}`;
      }

      if (resText) {
        subjectEl.textContent = `Subject: ${sub}`;
        resultEl.textContent = resText;
        pdfLink.href = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${urlPart}.pdf`;
        pdfLink.style.display = 'block';
        
        // Auto-copy only the Rove-friendly text
        navigator.clipboard.writeText(resText);
      } else {
        resultEl.textContent = "No valid code found";
        pdfLink.style.display = 'none';
        subjectEl.textContent = "Subject: ----";
      }
    }

    async function handleManualPaste() {
      try {
        const text = await navigator.clipboard.readText();
        if(text) parseCode(text);
      } catch(e) { alert("Paste blocked. Grant permissions."); }
    }

    async function handleFlow() {
      if (currentMode === 'camera' && !isCameraOn) {
        await initWorker();
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          video.srcObject = stream; video.style.display = 'block'; isCameraOn = true;
          mainBtn.textContent = "Scan Now";
        } catch(e) { alert("Camera error"); }
      } else { scan(); }
    }

    async function initWorker() {
      if (worker) return;
      worker = Tesseract.createWorker({ logger: m => { if(m.status === 'recognizing text') bar.style.width = (m.progress * 100) + '%'; } });
      await worker.load(); await worker.loadLanguage('eng'); await worker.initialize('eng');
    }

    function scan() {
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.filter = 'grayscale(100%) contrast(200%) brightness(110%)';
      ctx.drawImage(video, 0, 0);
      worker.recognize(canvas).then(({ data: { text } }) => {
        parseCode(text);
        bar.style.width = '0%';
      });
    }
  </script>
</body>
</html>
