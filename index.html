<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIE Deep Finder (GCE Edition)</title>
    <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 1.6rem; text-align: center; margin-bottom: 8px; color: var(--accent); font-weight: 600; }
        .subtitle { font-size: 0.85rem; text-align: center; opacity: 0.6; margin-bottom: 24px; }
        #preview { width: 100%; height: 220px; background: #000; border-radius: 16px; object-fit: contain; margin-bottom: 20px; border: 1px dashed var(--accent); }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: var(--bg); font-weight: 700; cursor: pointer; margin-bottom: 12px; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn-alt { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        #status { font-size: 0.9rem; margin-top: 15px; text-align: center; color: var(--accent); min-height: 1.2rem; }
        .result-box { margin-top: 25px; padding: 18px; background: rgba(56, 189, 248, 0.05); border: 1px solid var(--accent); border-radius: 12px; display: none; text-align: center; }
        .result-box b { color: var(--accent); display: block; margin-bottom: 10px; font-size: 1.1rem; }
        a { color: var(--bg); background: var(--text); text-decoration: none; font-weight: 800; display: block; padding: 12px; border-radius: 8px; margin-top: 10px; }
        #fallback-search { display: none; margin-top: 10px; color: #fbbf24; cursor: pointer; text-decoration: underline; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Question DeepSearch</h1>
    <div class="subtitle">Identify paper and find the specific page</div>
    
    <img id="preview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
    
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(event)">
    <button class="btn" onclick="document.getElementById('file-input').click()">Upload Question Photo</button>
    <button id="scan-btn" class="btn btn-alt" style="display:none" onclick="startDeepSearch()">Analyze & Search</button>

    <div id="status"></div>
    <div id="fallback-search" onclick="caieFinderFallback()">Couldn't find paper code? Try Keyword Search.</div>

    <div id="result" class="result-box">
        <b id="paper-info">Paper Identified</b>
        <span id="page-indicator" style="font-size: 0.8rem; opacity: 0.7;">Scanning PDF pages...</span>
        <a id="ms-link" target="_blank">Open Mark Scheme</a>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // SUBJECT MAPPER: Required for GCE Guide URL structure
    const subjectMap = {
        "9709": "Mathematics (9709)",
        "0580": "Mathematics (0580)",
        "9702": "Physics (9702)",
        "0625": "Physics (0625)",
        "9701": "Chemistry (9701)",
        "0620": "Chemistry (0620)",
        "9700": "Biology (9700)",
        "0610": "Biology (0610)",
        "9618": "Computer Science (9618)",
        "0478": "Computer Science (0478)"
    };

    let extractedText = "";

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (f) => {
            document.getElementById('preview').src = f.target.result;
            document.getElementById('scan-btn').style.display = 'block';
            document.getElementById('status').textContent = "Ready to analyze.";
            document.getElementById('result').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    async function startDeepSearch() {
        const status = document.getElementById('status');
        const btn = document.getElementById('scan-btn');
        btn.disabled = true;
        status.textContent = "OCR: Reading text...";

        const worker = await Tesseract.createWorker();
        await worker.loadLanguage('eng');
        await worker.initialize('eng');
        const { data: { text } } = await worker.recognize(document.getElementById('preview'));
        extractedText = text;
        await worker.terminate();

        const metadata = parseMetadata(text);
        if (metadata) {
            document.getElementById('fallback-search').style.display = 'none';
            processGCEGuide(metadata);
        } else {
            status.textContent = "Paper code not found in photo.";
            document.getElementById('fallback-search').style.display = 'block';
            btn.disabled = false;
        }
    }

    function parseMetadata(text) {
        const clean = text.toUpperCase().replace(/[^A-Z0-9_/ ]/g, '');
        // Unified regex for slash and underscore formats
        const m = clean.match(/(\d{4})[\s/_]+(\d{1,2})[\s/_]+([MSWJOFN/ ]+)[\s/_]+(?:20)?(\d{2})/) || 
                clean.match(/(\d{4})_([MSW])(\d{2})_QP_(\d{1,2})/);
        
        if (!m) return null;

        // Basic normalization
        let sub = m[1], papVar = m[2], seasRaw = m[3], yr = m[4];
        if (m.length === 5 && !isNaN(m[2])) { // Handle 9709/12/M/J/22
             papVar = m[2]; 
             seasRaw = m[3];
             yr = m[4];
        }

        let seas = 's';
        if (seasRaw.includes('W') || seasRaw.includes('ON') || seasRaw.includes('N')) seas = 'w';
        if (seasRaw.includes('M') || seasRaw.includes('F')) seas = 'm';

        return { sub, papVar, seas, yr };
    }

    async function processGCEGuide(m) {
        const status = document.getElementById('status');
        const resBox = document.getElementById('result');
        const subFolder = subjectMap[m.sub] || m.sub;
        const level = m.sub.startsWith('0') ? 'IGCSE' : 'A%20Levels';
        const fullYear = "20" + m.yr;

        const qpName = `${m.sub}_${m.seas}${m.yr}_qp_${m.papVar}.pdf`;
        const msName = `${m.sub}_${m.seas}${m.yr}_ms_${m.papVar}.pdf`;
        
        const qpUrl = `https://papers.gceguide.net/${level}/${subFolder}/${fullYear}/${qpName}`;
        const msUrl = `https://papers.gceguide.net/${level}/${subFolder}/${fullYear}/${msName}`;

        status.textContent = "Paper Identified. Locating question...";
        resBox.style.display = 'block';
        document.getElementById('paper-info').textContent = `${m.sub} Paper ${m.papVar} (${m.seas.toUpperCase()} 20${m.yr})`;
        
        // Deep Search via Proxy
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(qpUrl)}`;
        
        try {
            const loadingTask = pdfjsLib.getDocument(proxyUrl);
            const pdf = await loadingTask.promise;
            
            // Clean question text for matching (pick first few words)
            const query = extractedText.toLowerCase().replace(/[^a-z0-9 ]/g, '').split(' ').filter(w => w.length > 3).slice(0, 4);
            
            let foundPage = 1;
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ').toLowerCase();
                
                if (query.every(word => pageText.includes(word))) {
                    foundPage = i;
                    break;
                }
            }

            document.getElementById('page-indicator').textContent = `Question found on Page ${foundPage}`;
            const finalMsLink = document.getElementById('ms-link');
            finalMsLink.href = `${msUrl}#page=${foundPage}`;
            status.textContent = "Success!";
        } catch (e) {
            document.getElementById('page-indicator').textContent = "Couldn't scan inside PDF (GCE Guide blocked proxy).";
            document.getElementById('ms-link').href = msUrl;
            status.textContent = "Partial Success: Link generated.";
        }
    }

    function caieFinderFallback() {
        const query = encodeURIComponent(extractedText.substring(0, 100));
        window.open(`https://caiefinder.com/search?query=${query}`, '_blank');
    }
</script>

</body>
</html>
