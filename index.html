<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>leakbridge papers</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a2a3a;
      --card-bg: #004d4d;
      --text-main: #ffffff;
      --accent-teal: #006666;
      --progress-bg: #4a5a6a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; letter-spacing: 2px; font-weight:400 }
    .header h2 { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; letter-spacing: 2px; font-weight:200 }

    #video-wrap {
      width: 100%;
      max-width: 340px;
      height: 220px;
      background: var(--card-bg);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    video, #uploaded-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    #uploaded-img { object-fit: contain; background: #0b1926; }

    #aim-box {
      position: absolute;
      width: 85%;
      height: 50px;
      border: 2px solid #ffffff;
      border-radius: 10px;
      pointer-events: none;
      z-index: 5;
      display: none; /* Only show when camera is on */
    }

    /* THE NEW INTERNAL CAMERA BUTTON */
    .internal-cam-btn {
      position: absolute;
      bottom: 15px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .internal-cam-btn:hover { background: rgba(255, 255, 255, 0.3); }

    .action-row {
      display: flex;
      gap: 8px;
      margin-bottom: 30px;
      width: 100%;
      max-width: 340px;
    }

    .btn-action {
      background: transparent;
      color: white;
      border: 1.5px solid #ffffff;
      padding: 12px 0;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      flex: 1;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      transition: 0.2s;
    }
    .btn-action:active { background: rgba(255,255,255,0.1); transform: scale(0.96); }

    .output-section { width: 100%; max-width: 340px; }

    .section-group {
      background: rgba(0, 77, 77, 0.4);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border: 1px solid #ffffff;
      position: relative;
    }

    .section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.6;
      margin-bottom: 10px;
      display: block;
    }

    .subject-sub { font-size: 0.8rem; opacity: 0.5; display: block; margin-bottom: 4px; }
    #result-text { font-size: 1.1rem; font-weight: 600; display: block; line-height: 1.3; }

    .pdf-btn {
      display: none;
      background: #ffffff;
      color: #004d4d;
      padding: 12px;
      text-align: center;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      margin-top: 5px;
      font-size: 0.9rem;
    }

    .toggle-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.6rem;
      cursor: pointer;
      position: absolute;
      right: 15px;
      top: 12px;
    }
    .toggle-btn.off { opacity: 0.4; }

    .progress-container { width: 100%; height: 2px; background: var(--progress-bg); margin-top: 10px; }
    #bar { height: 100%; background: #ffffff; width: 0%; transition: width 0.2s; }

    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CAMBRIGE IS GAY</h1>
    <h2>crazy how the world works</h2>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <img id="uploaded-img">
    <div id="aim-box"></div>
    <button id="cam-toggle-btn" class="internal-cam-btn" onclick="toggleCamera()">Open Camera</button>
  </div>

  <div class="action-row">
    <button class="btn-action" id="main-btn" onclick="handleFlow()">Scan</button>
    <label class="btn-action" for="file-upload" style="cursor: pointer; display: flex; align-items: center; justify-content: center;">Upload</label>
    <input type="file" id="file-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
    <button class="btn-action" onclick="handleManualPaste()">Paste</button>
  </div>

  <div class="output-section">
    <div class="section-group">
      <span class="section-title">For Rove</span>
      <button class="toggle-btn off" id="copy-toggle" onclick="toggleCopy()">Auto-Copy Off</button>
      <span class="subject-sub" id="subject-display">Subject: ----</span>
      <span id="result-text">Ready...</span>
    </div>

    <div class="section-group">
      <span class="section-title">For Papa Cambridge</span>
      <a id="pdf-link" class="pdf-btn" target="_blank">OPEN PDF</a>
    </div>

    <div class="progress-container"><div id="bar"></div></div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const uploadedImg = document.getElementById('uploaded-img');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultEl = document.getElementById('result-text');
    const subjectEl = document.getElementById('subject-display');
    const pdfLink = document.getElementById('pdf-link');
    const mainBtn = document.getElementById('main-btn');
    const camToggleBtn = document.getElementById('cam-toggle-btn');
    const aimBox = document.getElementById('aim-box');
    const bar = document.getElementById('bar');
    const copyToggle = document.getElementById('copy-toggle');
    
    let stream = null, worker = null, isCameraOn = false, currentMode = 'camera', autoCopy = false;

    // REFACTORED CAMERA TOGGLE LOGIC
    async function toggleCamera() {
      if (isCameraOn) {
        // TURN OFF
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }
        video.style.display = 'none';
        aimBox.style.display = 'none';
        camToggleBtn.textContent = "Open Camera";
        isCameraOn = false;
      } else {
        // TURN ON
        await initWorker();
        try {
          stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'environment', width: { ideal: 1280 } } 
          });
          video.srcObject = stream;
          video.style.display = 'block';
          uploadedImg.style.display = 'none';
          aimBox.style.display = 'block';
          camToggleBtn.textContent = "Close Camera";
          isCameraOn = true;
          currentMode = 'camera';
          mainBtn.textContent = "Scan";
        } catch (e) {
          alert("Camera access denied or unavailable.");
        }
      }
    }

    function parseCode(text) {
      const clean = text.toUpperCase().replace(/[^A-Z0-9_]/g, ' ').trim();
      let resText = "", urlPart = "";
      let sub = "9709", pap = "", varnt = "", seas = "", yr = "", type = "ms";

      const mUnder = clean.match(/(\d{4})?_?([MSW])(\d{2})_(QP|MS)_(\d)(\d)/);
      const mSlash = clean.match(/(\d{4})?\s*([1-8])\s*([1-6])\s*([MFJON0])\s*([MFJON0])?\s*(?:20)?(\d{2})/);
      const mLegacy = clean.match(/(\d{4})?\s*0([1-8])\s*([MFJON0])\s*([MFJON0])?\s*(?:20)?(\d{2})/);

      if (mUnder) {
        sub = mUnder[1] || "9709"; seas = mUnder[2].toLowerCase(); yr = mUnder[3]; type = mUnder[4].toLowerCase(); pap = mUnder[5]; varnt = mUnder[6];
        let typeName = (type === 'qp') ? "Question Paper" : "Mark Scheme";
        let sName = (seas === 'm') ? "March" : (seas === 's' ? "Summer" : "Winter");
        resText = `${typeName} Paper ${pap} Variant ${varnt} ${sName} 20${yr}`;
        urlPart = `${sub}_${seas}${yr}_${type}_${pap}${varnt}`;
      } 
      else if (mSlash) {
        sub = mSlash[1] || "9709"; pap = mSlash[2]; varnt = mSlash[3]; yr = mSlash[6];
        let s = mSlash[4];
        seas = (s === 'M') ? 'm' : (s === 'J' ? 's' : 'w');
        let sName = (s === 'M') ? "March" : (s === 'J' ? "Summer" : "Winter");
        resText = `Mark Scheme Paper ${pap} Variant ${varnt} ${sName} 20${yr}`;
        urlPart = `${sub}_${seas}${yr}_ms_${pap}${varnt}`;
      }
      else if (mLegacy) {
        sub = mLegacy[1] || "9709"; pap = mLegacy[2]; yr = mLegacy[5];
        let s = mLegacy[3];
        seas = (s === 'M') ? 'm' : (s === 'J' ? 's' : 'w');
        let sName = (s === 'M') ? "March" : (s === 'J' ? "Summer" : "Winter");
        resText = `Mark Scheme Paper ${pap} ${sName} 20${yr}`;
        urlPart = `${sub}_${seas}${yr}_ms_0${pap}`;
      }

      if (resText) {
        subjectEl.textContent = `Subject: ${sub}`;
        resultEl.textContent = resText;
        pdfLink.href = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${urlPart}.pdf`;
        pdfLink.style.display = 'block';
        if(autoCopy) navigator.clipboard.writeText(resText);
      } else {
        resultEl.textContent = "No valid code found";
        pdfLink.style.display = 'none';
        subjectEl.textContent = "Subject: ----";
      }
    }

    async function handleManualPaste() {
      try {
        const text = await navigator.clipboard.readText();
        if(text) parseCode(text);
      } catch(e) { alert("Enable clipboard permissions"); }
    }

    function toggleCopy() {
      autoCopy = !autoCopy;
      copyToggle.textContent = autoCopy ? "Auto-Copy On" : "Auto-Copy Off";
      copyToggle.classList.toggle('off', !autoCopy);
    }

    function handleFileUpload(event) {
      if (event.target.files[0]) {
        const url = URL.createObjectURL(event.target.files[0]);
        uploadedImg.src = url;
        uploadedImg.onload = () => {
          // If camera was on, shut it off automatically when uploading
          if (isCameraOn) toggleCamera(); 
          video.style.display = 'none';
          uploadedImg.style.display = 'block';
          currentMode = 'image';
          mainBtn.textContent = "Scan Image";
        }
      }
    }

    async function handleFlow() {
      if (currentMode === 'camera' && !isCameraOn) {
        alert("Please open the camera first using the button in the viewfinder.");
      } else {
        await initWorker();
        scan();
      }
    }

    async function initWorker() {
      if (worker) return;
      worker = Tesseract.createWorker({ logger: m => { if(m.status === 'recognizing text') bar.style.width = (m.progress * 100) + '%'; } });
      await worker.load(); await worker.loadLanguage('eng'); await worker.initialize('eng');
      await worker.setParameters({ tessedit_char_whitelist: '0123456789MSWQPmswqp/_ ' });
    }

    function scan() {
      mainBtn.disabled = true;
      if (currentMode === 'image') {
        canvas.width = uploadedImg.naturalWidth; canvas.height = uploadedImg.naturalHeight;
      } else {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      }
      ctx.filter = 'grayscale(100%) contrast(250%) brightness(110%)';
      ctx.drawImage(currentMode === 'image' ? uploadedImg : video, 0, 0);
      worker.recognize(canvas).then(({ data: { text } }) => {
        parseCode(text);
        mainBtn.disabled = false;
        bar.style.width = '0%';
      });
    }
  </script>
</body>
</html>
