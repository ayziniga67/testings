<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leakbridge Pro - Speed Edition</title>
  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --warn: #facc15; --text: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 450px; }

    /* Viewport & Progress Overlay */
    #viewport-container { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; position: relative; border: 1px solid rgba(255,255,255,0.1); }
    video, canvas { width: 100%; height: 100%; object-fit: cover; }
    
    #overlay { 
      position: absolute; top:0; left:0; width:100%; height:100%; 
      background: rgba(15, 23, 42, 0.9); display: none; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 10;
    }
    .progress-container { width: 70%; height: 8px; background: #334155; border-radius: 10px; margin-top: 15px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.2s; }
    #overlay-text { font-weight: 700; color: var(--accent); font-size: 0.9rem; letter-spacing: 1px; }

    /* Inputs */
    .input-zone { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 2px solid var(--warn); display: none; }
    .input-zone.active { display: block; }
    input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; margin: 10px 0; }

    /* Controls */
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .btn { padding: 14px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
    .btn-capture { background: var(--accent); color: #000; grid-column: span 2; font-size: 1.1rem; }
    .btn-secondary { background: #334155; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn:active { transform: scale(0.98); }

    #log { text-align: center; font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; height: 1.2rem; }
    .viewer-sec { display: none; width: 100%; }
    iframe { width: 100%; height: 500px; border-radius: 12px; background: white; border: none; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <div id="viewport-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="overlay">
      <div id="overlay-text">ANALYZING...</div>
      <div class="progress-container"><div id="progress-bar"></div></div>
      <div id="sub-log" style="font-size: 0.6rem; color: #94a3b8; margin-top: 8px;">Preparing Engines</div>
    </div>
  </div>

  <div id="log">Ready</div>

  <div class="input-zone" id="input-zone">
    <label id="prompt-label" style="font-size: 0.7rem; color: var(--warn); font-weight: 800;">MISSING DATA</label>
    <input type="text" id="manual-field" placeholder="...">
    <button class="btn btn-capture" onclick="resumeLogic()">CONTINUE</button>
  </div>

  <div class="btn-row" id="main-btns">
    <button class="btn btn-capture" id="cap-btn" onclick="takeSnapshot()">CAPTURE & ANALYZE</button>
    <button class="btn btn-secondary" onclick="startCam()">START CAMERA</button>
    <button class="btn btn-danger" onclick="stopCam()">CLOSE CAMERA</button>
    <label class="btn btn-secondary" style="text-align:center; grid-column: span 2;">UPLOAD PHOTO<input type="file" hidden onchange="handleFile(event)"></label>
  </div>

  <div class="viewer-sec" id="viewer-sec">
    <div style="display:flex; justify-content:space-between; font-size: 0.8rem; font-weight: 600;">
        <span id="paper-id" style="color:var(--accent);"></span>
        <span id="page-jump-info"></span>
    </div>
    <iframe id="pdf-frame"></iframe>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
  
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const overlay = document.getElementById('overlay');
  const progBar = document.getElementById('progress-bar');
  const subLog = document.getElementById('sub-log');
  
  let stream = null;
  let activeState = { sub: '', seas: '', yr: '', pap: '', q: '', words: [] };

  async function startCam() {
    if (stream) stopCam();
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1280 } });
      video.srcObject = stream;
      video.style.display = 'block';
      canvas.style.display = 'none';
      document.getElementById('log').innerText = "Camera Active";
    } catch(e) { alert("Camera Error"); }
  }
  startCam(); // Start on load

  function stopCam() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
      video.style.display = 'none';
      document.getElementById('log').innerText = "Camera Closed";
    }
  }

  function updateProgress(percent, text) {
    progBar.style.width = percent + "%";
    subLog.innerText = text;
  }

  function handleFile(e) {
      const img = new Image();
      img.onload = () => {
          canvas.width = img.width; canvas.height = img.height;
          canvas.getContext('2d').drawImage(img, 0,0);
          video.style.display = 'none';
          canvas.style.display = 'block';
          runTwoPassScan();
      };
      img.src = URL.createObjectURL(e.target.files[0]);
  }

  async function takeSnapshot() {
    if (!stream) return alert("Open camera first!");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    video.style.display = 'none';
    canvas.style.display = 'block';
    overlay.style.display = 'flex';
    runTwoPassScan();
  }

  async function runTwoPassScan() {
    updateProgress(10, "Initializing OCR...");
    try {
        const worker = await Tesseract.createWorker('eng');
        updateProgress(30, "Reading Text...");
        const { data: { text } } = await worker.recognize(canvas);
        await worker.terminate();

        const clean = text.toUpperCase().replace(/\s+/g, '');
        const codeMatch = clean.match(/(\d{4})?[^\w]*?([FMSW])(\d{2})\/(\d{1,2})(?:\/Q(\d+))?/);
        
        if(codeMatch) {
            activeState.sub = codeMatch[1] || "";
            activeState.seas = (codeMatch[2]==='M'||codeMatch[2]==='F')?'m':(codeMatch[2]==='S'?'s':'w');
            activeState.yr = codeMatch[3]; activeState.pap = codeMatch[4];
            activeState.q = codeMatch[5] || "";
        }
        activeState.words = text.toLowerCase().match(/\b(\w{5,})\b/g) || [];

        if(!activeState.seas) {
            showManual("Full Code Not Found", "e.g. 9702 M23/12/Q1");
        } else if(!activeState.sub) {
            showManual(`Detected Paper ${activeState.seas.toUpperCase()}${activeState.yr}/P${activeState.pap}`, "Enter 4-digit Subject Code");
        } else {
            startStageThree();
        }
    } catch(e) {
        alert("Scan Failed. Use Manual Input.");
        showManual("Scan Error", "Enter code manually");
    }
  }

  function showManual(label, placeholder) {
    overlay.style.display = 'none';
    const zone = document.getElementById('input-zone');
    document.getElementById('prompt-label').innerText = label;
    document.getElementById('manual-field').placeholder = placeholder;
    zone.classList.add('active');
  }

  function resumeLogic() {
    const val = document.getElementById('manual-field').value.toUpperCase().replace(/\s+/g, '');
    if(val.length === 4 && !isNaN(val)) {
        activeState.sub = val;
    } else {
        const m = val.match(/(\d{4})([FMSW])(\d{2})\/(\d{1,2})(?:\/Q(\d+))?/);
        if(m) {
            activeState.sub = m[1]; activeState.seas = (m[2]==='M'||m[2]==='F')?'m':(m[2]==='S'?'s':'w');
            activeState.yr = m[3]; activeState.pap = m[4]; activeState.q = m[5] || "";
        }
    }
    document.getElementById('input-zone').classList.remove('active');
    overlay.style.display = 'flex';
    startStageThree();
  }

  async function startStageThree() {
    const { sub, seas, yr, pap, q, words } = activeState;
    const msUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_ms_${pap}.pdf`;
    const qpUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_qp_${pap}.pdf`;

    document.getElementById('viewer-sec').style.display = 'block';
    document.getElementById('paper-id').innerText = `${sub} | ${seas.toUpperCase()}${yr} | P${pap}`;

    let targetQ = q;

    if(!targetQ && words.length > 0) {
        updateProgress(50, "Searching Question Paper...");
        targetQ = await findQFromQP(qpUrl, words);
    }

    updateProgress(80, "Finding Answer in MS...");
    const finalPage = await jumpToMSPage(msUrl, targetQ || "1");
    
    updateProgress(100, "Done!");
    setTimeout(() => {
        overlay.style.display = 'none';
        document.getElementById('pdf-frame').src = `https://docs.google.com/viewer?url=${encodeURIComponent(msUrl)}&embedded=true#page=${finalPage}`;
        document.getElementById('page-jump-info').innerText = `Jumped to Page ${finalPage}`;
    }, 500);
  }

  // Optimized Scan with Progress Updates
  async function findQFromQP(url, words) {
    try {
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        const pdf = await pdfjsLib.getDocument(proxy).promise;
        const total = pdf.numPages;
        
        for (let i = 1; i <= total; i++) {
            updateProgress(50 + (i/total * 20), `Scanning QP Page ${i}/${total}`);
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(s => s.str).join(' ').toLowerCase();
            
            if (words.slice(0,3).every(w => text.includes(w))) {
                const match = text.match(/(?:^|\s)(\d+)\s*\./);
                return match ? match[1] : null;
            }
            // Anti-freeze pause
            await new Promise(r => setTimeout(r, 10));
        }
    } catch(e) { return null; }
  }

  async function jumpToMSPage(url, qNum) {
    let pageNum = 1;
    try {
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        const pdf = await pdfjsLib.getDocument(proxy).promise;
        const total = pdf.numPages;

        for (let i = 1; i <= total; i++) {
            updateProgress(80 + (i/total * 15), `Scanning MS Page ${i}/${total}`);
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(s => s.str).join(' ');
            
            if (new RegExp(`\\b${qNum}\\b`).test(text)) {
                pageNum = i; break;
            }
            await new Promise(r => setTimeout(r, 10));
        }
    } catch(e) {}
    return pageNum;
  }
</script>
</body>
</html>
