<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leakbridge SmartScan v4</title>
  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --warn: #facc15; --text: #f8fafc; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { width: 100%; max-width: 450px; }

    /* Snapshot Viewport */
    #viewport {
      width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px;
      overflow: hidden; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }
    video, canvas { width: 100%; height: 100%; object-fit: cover; }
    #snapshot-overlay { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(0,0,0,0.6); display: none; justify-content: center; 
        align-items: center; font-weight: 700; color: var(--accent);
    }

    .input-zone { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 2px solid var(--warn); display: none; }
    .input-zone.active { display: block; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { border-color: var(--warn); } 50% { border-color: transparent; } 100% { border-color: var(--warn); } }
    
    input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; margin: 10px 0; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .btn { padding: 14px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-capture { background: var(--accent); color: #000; grid-column: span 2; font-size: 1.1rem; }
    .btn-reset { background: #334155; color: white; }
    .btn:disabled { opacity: 0.5; }

    #log { text-align: center; font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; }
    
    .viewer-sec { display: none; width: 100%; border-top: 1px solid #334155; padding-top: 20px; }
    iframe { width: 100%; height: 500px; border-radius: 12px; background: white; border: none; }
  </style>
</head>
<body>

<div class="container">
  <div id="viewport">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="snapshot-overlay">PROCESSING...</div>
  </div>

  <div id="log">Align paper and tap Capture</div>

  <div class="input-zone" id="input-zone">
    <label id="prompt-label">Subject Code Needed:</label>
    <input type="text" id="manual-field" placeholder="e.g. 9702">
    <button class="btn btn-capture" onclick="resumeLogic()">CONTINUE</button>
  </div>

  <div class="btn-row" id="main-btns">
    <button class="btn btn-capture" id="cap-btn" onclick="takeSnapshot()">CAPTURE & ANALYZE</button>
    <button class="btn btn-reset" onclick="resetCamera()">RESET CAMERA</button>
    <label class="btn btn-reset" style="text-align:center;">UPLOAD<input type="file" hidden onchange="handleFile(event)"></label>
  </div>

  <div class="viewer-sec" id="viewer-sec">
    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
        <span id="paper-id" style="color:var(--accent); font-weight:700;"></span>
        <span id="page-info" style="font-size:0.8rem;">Jumping to MS...</span>
    </div>
    <iframe id="pdf-frame"></iframe>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
  
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const overlay = document.getElementById('snapshot-overlay');
  const log = document.getElementById('log');
  
  let stream = null;
  let activeState = { sub: '', seas: '', yr: '', pap: '', q: '', words: [] };

  // --- 1. CAMERA SYSTEM ---
  async function startCam() {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
  }
  startCam();

  function resetCamera() {
    video.style.display = 'block';
    canvas.style.display = 'none';
    overlay.style.display = 'none';
    document.getElementById('viewer-sec').style.display = 'none';
    document.getElementById('input-zone').classList.remove('active');
    log.innerText = "Camera active.";
  }

  function handleFile(e) {
      const img = new Image();
      img.onload = () => {
          canvas.width = img.width; canvas.height = img.height;
          canvas.getContext('2d').drawImage(img, 0,0);
          video.style.display = 'none';
          canvas.style.display = 'block';
          runTwoPassScan();
      };
      img.src = URL.createObjectURL(e.target.files[0]);
  }

  // --- 2. SNAPSHOT & TWO-PASS SCAN ---
  async function takeSnapshot() {
    // Freeze Frame
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    video.style.display = 'none';
    canvas.style.display = 'block';
    overlay.style.display = 'flex';
    
    runTwoPassScan();
  }

  async function runTwoPassScan() {
    const worker = await Tesseract.createWorker('eng');
    const { data: { text } } = await worker.recognize(canvas);
    await worker.terminate();

    const clean = text.toUpperCase().replace(/\s+/g, '');
    
    // PASS 1: The Code (M23/12/Q1 style)
    const codeMatch = clean.match(/(\d{4})?[^\w]*?([FMSW])(\d{2})\/(\d{1,2})(?:\/Q(\d+))?/);
    if(codeMatch) {
        activeState.sub = codeMatch[1] || "";
        activeState.seas = (codeMatch[2]==='M'||codeMatch[2]==='F')?'m':(codeMatch[2]==='S'?'s':'w');
        activeState.yr = codeMatch[3];
        activeState.pap = codeMatch[4];
        activeState.q = codeMatch[5] || "";
    }

    // PASS 2: Combination of words (Context)
    // Only strictly needed if Q is not in the code
    activeState.words = text.toLowerCase().match(/\b(\w{5,})\b/g) || [];

    // Check if we need manual help
    if(!activeState.seas) {
        showManual("Full Code Not Found. Enter manually:", "e.g. 9702 M23/12/Q1");
    } else if(!activeState.sub) {
        showManual(`Detected ${activeState.seas.toUpperCase()}${activeState.yr}/P${activeState.pap}. Enter Subject:`, "e.g. 9702");
    } else {
        startThirdStage();
    }
  }

  function showManual(label, placeholder) {
    overlay.style.display = 'none';
    const zone = document.getElementById('input-zone');
    document.getElementById('prompt-label').innerText = label;
    document.getElementById('manual-field').placeholder = placeholder;
    zone.classList.add('active');
  }

  function resumeLogic() {
    const val = document.getElementById('manual-field').value.toUpperCase().replace(/\s+/g, '');
    if(val.length === 4 && !isNaN(val)) {
        activeState.sub = val;
    } else {
        const m = val.match(/(\d{4})([FMSW])(\d{2})\/(\d{1,2})(?:\/Q(\d+))?/);
        if(m) {
            activeState.sub = m[1]; 
            activeState.seas = (m[2]==='M'||m[2]==='F')?'m':(m[2]==='S'?'s':'w');
            activeState.yr = m[3]; activeState.pap = m[4]; activeState.q = m[5] || "";
        }
    }
    document.getElementById('input-zone').classList.remove('active');
    startThirdStage();
  }

  // --- 3. THIRD STAGE (PDF ROUTING) ---
  async function startThirdStage() {
    overlay.style.display = 'none';
    log.innerText = "Routing to Mark Scheme...";
    
    const { sub, seas, yr, pap, q, words } = activeState;
    const msUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_ms_${pap}.pdf`;
    const qpUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_qp_${pap}.pdf`;

    document.getElementById('viewer-sec').style.display = 'block';
    document.getElementById('paper-id').innerText = `${sub} | ${seas.toUpperCase()}${yr} | P${pap}`;

    let targetQ = q;

    // If Q wasn't in the code, use Pass 2 words to find Q in the Question Paper
    if(!targetQ && words.length > 0) {
        log.innerText = "Scanning QP for Question Number...";
        targetQ = await findQFromQP(qpUrl, words);
    }

    // Now jump to the page in the Mark Scheme
    if(targetQ) {
        log.innerText = `Jumping to Question ${targetQ} in MS...`;
        await jumpToMSPage(msUrl, targetQ);
    } else {
        document.getElementById('pdf-frame').src = `https://docs.google.com/viewer?url=${encodeURIComponent(msUrl)}&embedded=true`;
    }
  }

  async function findQFromQP(url, words) {
    try {
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        const pdf = await pdfjsLib.getDocument(proxy).promise;
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(s => s.str).join(' ').toLowerCase();
            if (words.slice(0,3).every(w => text.includes(w))) {
                const match = text.match(/(?:^|\s)(\d+)\s*\./);
                return match ? match[1] : null;
            }
        }
    } catch(e) { return null; }
  }

  async function jumpToMSPage(url, qNum) {
    let pageNum = 1;
    try {
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        const pdf = await pdfjsLib.getDocument(proxy).promise;
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(s => s.str).join(' ');
            // Regex to find Question number at start of marking block
            if (new RegExp(`\\b${qNum}\\b`).test(text)) {
                pageNum = i;
                break;
            }
        }
    } catch(e) {}
    document.getElementById('pdf-frame').src = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true#page=${pageNum}`;
    document.getElementById('page-info').innerText = `Page ${pageNum}`;
  }
</script>
</body>
</html>
