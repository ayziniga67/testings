<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leakbridge - Full Viewport Lazy Snap Engine</title>
  <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --nav-btn: #334155; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 450px; }
    
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; letter-spacing: 2px; font-weight:400 }
    .header h2 { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; letter-spacing: 2px; font-weight:200 }

    /* Expanded Structural Input Controls Dashboard */
    .settings-bar { width: 100%; background: var(--card); padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
    .input-row { display: flex; justify-content: space-between; gap: 6px; width: 100%; }
    .input-group { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
    .settings-bar label { font-size: 0.65rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
    .settings-bar input { background: #0f172a; border: 1px solid #334155; color: white; padding: 6px 4px; border-radius: 6px; text-align: center; font-weight: 600; font-size: 0.85rem; width: 100%; outline: none; }

    #media-box { width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
    video, canvas { width: 100%; height: 100%; object-fit: cover; }
    
    #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(15, 23, 42, 0.96); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 50; }
    .progress-wrap { width: 70%; height: 6px; background: #334155; border-radius: 10px; margin-top: 15px; overflow: hidden; }
    #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .btn { padding: 14px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-main { background: var(--accent); color: #0f172a; grid-column: span 2; font-size: 1rem; }
    .btn-sub { background: #334155; color: white; font-size: 0.8rem; }
    .btn-reset { background: #ea580c; color: white; }

    #log { font-size: 0.8rem; color: #94a3b8; text-align: center; margin-bottom: 5px; }
    #debug-read { font-size: 0.6rem; color: #475569; text-align: center; margin-bottom: 10px; font-family: monospace; overflow: hidden; height: 12px; }
    
    /* Native Document Display Workspace */
    .viewer-wrap { display: none; width: 100%; margin-top: 10px; background: var(--card); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); padding: 12px; }
    #info-bar { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; margin-bottom: 10px; padding: 0 4px; }
    
    /* Horizontal Navigation Picker Bar */
    #pdf-nav-bar { width: 100%; display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    #pdf-nav-bar::-webkit-scrollbar { height: 4px; }
    #pdf-nav-bar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    .nav-jump-btn { background: var(--nav-btn); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; flex-shrink: 0; transition: 0.2s; }
    .nav-jump-btn.active { background: var(--accent); color: #0f172a; }

    /* Strict 1-Page Native CSS Scroll Snap-Track Viewport */
    #pdf-sections-track { width: 100%; height: 520px; display: flex; flex-direction: column; gap: 0px; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; border-radius: 8px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); }
    .page-section { width: 100%; height: 100%; min-height: 100%; scroll-snap-align: start; scroll-snap-stop: always; flex-shrink: 0; position: relative; display: flex; align-items: center; justify-content: center; background: #0f172a; overflow: hidden; }
    .page-badge { position: absolute; top: 12px; left: 12px; background: rgba(15, 23, 42, 0.85); color: var(--accent); font-size: 0.65rem; font-weight: 700; padding: 4px 8px; border-radius: 4px; z-index: 10; border: 1px solid rgba(255,255,255,0.05); }
    
    /* Strict Layout Canvas Scaling Rules */
    .page-section canvas { max-width: 100%; max-height: 100%; width: auto; height: auto; display: block; background: white; image-rendering: -webkit-optimize-contrast; }
    .loading-placeholder { font-size: 0.8rem; color: #475569; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }
  </style>
</head>
<body>
  
  <div class="header">
    <h1>Leakbridge Papers</h1>
    <h2>only takes code like: ON/2021/22/Q5,S23/13/Q26</h2>
  </div>

<div class="container">
  <div class="settings-bar">
    <div class="input-row">
      <div class="input-group">
        <label>Subject</label>
        <input type="text" id="sub-input" value="9702" maxlength="4">
      </div>
      <div class="input-group">
        <label>Year</label>
        <input type="text" id="yr-input" value="21" maxlength="2">
      </div>
      <div class="input-group">
        <label>Series</label>
        <input type="text" id="seas-input" value="w" maxlength="1">
      </div>
      <div class="input-group">
        <label>Paper</label>
        <input type="text" id="pap-input" value="22" maxlength="2">
      </div>
      <div class="input-group">
        <label>Target Q</label>
        <input type="text" id="q-input" value="5" maxlength="2">
      </div>
    </div>
  </div>

  <div id="media-box">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="overlay">
      <div id="status-txt" style="font-weight:700; color:var(--accent);">INITIALIZING...</div>
      <div class="progress-wrap"><div id="progress-fill"></div></div>
    </div>
  </div>

  <div id="log">Ready to Scan Paper</div>
  <div id="debug-read"></div>

  <div class="btn-grid">
    <button class="btn btn-main" onclick="doCapture()">CAPTURE & ANALYZE</button>
    <button class="btn btn-sub" onclick="runNativeRenderPipeline()">FETCH DIRECT</button>
    <label class="btn btn-sub" style="text-align:center; cursor:pointer;">UPLOAD<input type="file" hidden accept="image/*" onchange="doUpload(event)"></label>
    <button class="btn btn-sub btn-reset" onclick="initCam()">RESTART CAMERA</button>
  </div>

  <div class="viewer-wrap" id="viewer-wrap">
    <div id="info-bar">
        <span id="paper-id" style="color:var(--accent); font-weight:bold;"></span>
        <span id="match-status" style="font-size:0.75rem; color:#94a3b8;"></span>
    </div>
    <div id="pdf-nav-bar"></div>
    <div id="pdf-sections-track"></div>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
  
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const overlay = document.getElementById('overlay');
  const prog = document.getElementById('progress-fill');
  
  let ocrWorker = null;
  let currentPdf = null;
  let scrollObserver = null;
  let cameraStream = null;

  async function setupOCR() {
    if (!ocrWorker) {
      ocrWorker = await Tesseract.createWorker();
      await ocrWorker.loadLanguage('eng');
      await ocrWorker.initialize('eng');
    }
  }
  setupOCR();

  async function initCam() {
    try {
      if (cameraStream) stopCam();
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } });
      video.srcObject = cameraStream;
      video.style.display = 'block'; 
      canvas.style.display = 'none';
      document.getElementById('log').innerText = "Camera stream active.";
    } catch(e) { 
      document.getElementById('log').innerText = "Static file mode active."; 
    }
  }
  initCam();

  function stopCam() {
    if (cameraStream) {
      cameraStream.getTracks().forEach(track => track.stop());
      cameraStream = null;
    }
    video.srcObject = null;
  }

  function processImage() {
    const ctx = canvas.getContext('2d');
    const scale = video.videoWidth > 1200 ? 1200 / video.videoWidth : 1;
    canvas.width = video.videoWidth * scale;
    canvas.height = video.videoHeight * scale;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    stopCam(); 
    
    video.style.display = 'none'; 
    canvas.style.display = 'block';
    processPipeline();
  }

  function doCapture() {
    if(!cameraStream || video.videoWidth === 0) return alert("Camera resource warming up or offline.");
    processImage();
  }

  function doUpload(e) {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        
        stopCam(); 
        
        video.style.display = 'none'; 
        canvas.style.display = 'block';
        processPipeline();
      };
      img.src = ev.target.result;
    };
    if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
  }

  async function processPipeline() {
    overlay.style.display = 'flex';
    updateProg(15, "Analyzing Document Geometry...");

    try {
      await setupOCR();
      updateProg(40, "Extracting Core Identifiers...");
      const { data: { text } } = await ocrWorker.recognize(canvas);
      
      const clean = text.toUpperCase().replace(/\s+/g, '');
      document.getElementById('debug-read').innerText = "OCR String: " + clean.substring(0, 35);

      const regex = /([FMSW]|MJ|ON|FM)(?:\/)?(\d{4}|\d{2})[\/|I1\s-]?(\d{1,2})(?:[\/|I1\s-]?Q(\d+))?/i;
      const match = clean.match(regex);

      if (match) {
        let rawSession = match[1];
        let computedSeas = "s";
        if (rawSession === "MJ" || rawSession === "J" || rawSession === "S") computedSeas = "s";
        else if (rawSession === "ON" || rawSession === "W") computedSeas = "w";
        else if (rawSession === "FM" || rawSession === "M" || rawSession === "F") computedSeas = "m";
        else computedSeas = rawSession.toLowerCase();

        let rawYear = match[2];
        let computedYr = rawYear.length === 4 ? rawYear.substring(2) : rawYear;
        let computedPap = match[3];
        
        document.getElementById('yr-input').value = computedYr;
        document.getElementById('seas-input').value = computedSeas;
        document.getElementById('pap-input').value = computedPap;
        if (match[4]) document.getElementById('q-input').value = match[4];
      }
    } catch(err) {
      console.warn("OCR non-blocking bypass active.");
    }
    
    await runNativeRenderPipeline();
  }

  async function fetchPDFResilient(targetUrl) {
    const proxies = [
      `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
      `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
      `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`
    ];

    let lastError = null;
    for (let i = 0; i < proxies.length; i++) {
      try {
        const task = pdfjsLib.getDocument(proxies[i]);
        const pdf = await task.promise;
        return pdf;
      } catch (e) {
        console.warn(`Proxy node ${i + 1} bypassed.`);
        lastError = e;
      }
    }
    throw lastError || new Error("All proxy pathways rejected file package stream.");
  }

  async function runNativeRenderPipeline() {
    const sub = document.getElementById('sub-input').value.trim();
    const yr = document.getElementById('yr-input').value.trim();
    const seas = document.getElementById('seas-input').value.trim().toLowerCase();
    const pap = document.getElementById('pap-input').value.trim();
    const targetQ = document.getElementById('q-input').value.trim() || "1";

    const msUrl = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${sub}_${seas}${yr}_ms_${pap}.pdf`;

    document.getElementById('viewer-wrap').style.display = 'block';
    document.getElementById('paper-id').innerText = `${sub} | ${seas.toUpperCase()}${yr} | P${pap} | Q${targetQ}`;
    
    const navBar = document.getElementById('pdf-nav-bar');
    const track = document.getElementById('pdf-sections-track');
    
    navBar.innerHTML = '';
    track.innerHTML = ''; 
    if(scrollObserver) scrollObserver.disconnect();

    const loadingPhrases = [
      "leaking the paper",
      "giving the paper to redditors",
      "ruining careers..."
    ];
    let phraseIndex = 0;
    
    updateProg(60, loadingPhrases[phraseIndex]);

    const loadingInterval = setInterval(() => {
      if (document.getElementById('overlay').style.display !== 'none') {
        phraseIndex = (phraseIndex + 1) % loadingPhrases.length;
        document.getElementById('status-txt').innerText = loadingPhrases[phraseIndex];
      } else {
        clearInterval(loadingInterval);
      }
    }, 10000);

    try {
      currentPdf = await fetchPDFResilient(msUrl);
      
      let matchedPage = 2; 
      let foundMatch = false;

      // STEP 1: RESILIENT SEQUENTIAL EXTRACTION ENGINE
      for (let i = 2; i <= currentPdf.numPages; i++) {
        if (foundMatch) break;
        const page = await currentPdf.getPage(i);
        const content = await page.getTextContent();
        
        const fullPageText = content.items
          .filter(item => item && typeof item.str === 'string')
          .map(item => item.str)
          .join(' ')
          .toUpperCase();
        
        if (fullPageText.includes("GENERIC MARKING PRINCIPLE") || 
            fullPageText.includes("MARK SCHEME NOTES") || 
            fullPageText.includes("SPECIFIC MARKING INSTRUCTIONS")) {
          continue; 
        }

        // Expanded left margin search column viewport bounds
        let leftColumnItems = content.items.filter(item => {
          if (!item || typeof item.str !== 'string') return false;
          const itemX = item.transform ? item.transform[4] : 0;
          const itemY = item.transform ? item.transform[5] : 0;
          return itemX >= 0 && itemX < 160 && itemY > 30 && itemY < 810;
        });

        // Arrange elements top-to-bottom
        leftColumnItems.sort((a, b) => {
          const yA = a.transform ? a.transform[5] : 0;
          const yB = b.transform ? b.transform[5] : 0;
          return yB - yA;
        });

        for (let item of leftColumnItems) {
          const rawStr = item.str.trim();
          if (!rawStr) continue;

          if (/page|mark|total|subject|comment|cambridge/i.test(rawStr)) {
            continue;
          }

          // Strips out nested table header keywords like "Question" to find mid-page structural cells safely
          let cleanStr = rawStr.toUpperCase().replace(/QUESTION/g, '').trim();

          // Matches your exact question inside word boundaries (catches 5, 5(a), 5 (b) but NEVER 15 or 25)
          const boundaryRegex = new RegExp('(^|\\b)' + targetQ + '(\\b|\\(|\\)|$)');
          
          if (boundaryRegex.test(cleanStr)) {
            matchedPage = i;
            foundMatch = true;
            break;
          }
        }
      }

      // STEP 2: SETUP PRECISE INTERSECTION OBSERVER WITH HIGHER TRACK SNAP THRESHOLD
      scrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const pageNum = parseInt(entry.target.dataset.page);
            executeLazyRender(pageNum);
            updateActiveNavHighlight(pageNum);
          }
        });
      }, { root: track, threshold: 0.5 }); 

      // STEP 3: CONSTRUCT STRUCTURAL SHELLS
      for (let i = 1; i <= currentPdf.numPages; i++) {
        const navBtn = document.createElement('button');
        navBtn.className = 'nav-jump-btn' + (i === matchedPage ? ' active' : '');
        navBtn.id = `nav-btn-${i}`;
        navBtn.innerText = `Pg ${i}`;
        navBtn.onclick = () => jumpToSection(i, true);
        navBar.appendChild(navBtn);

        const section = document.createElement('div');
        section.id = `page-sec-${i}`;
        section.className = 'page-section';
        section.dataset.page = i;
        section.innerHTML = `<div class="page-badge">PAGE ${i}</div><span class="loading-placeholder" id="loader-txt-${i}">Scroll to View</span>`;
        
        track.appendChild(section);
        scrollObserver.observe(section);
      }

      document.getElementById('match-status').innerText = `Focused Page ${matchedPage}`;
      updateProg(100, "Sync Complete.");
      
      setTimeout(() => {
        overlay.style.display = 'none';
        jumpToSection(matchedPage, false); // Snaps instantly to target page during pipeline generation
      }, 150);

    } catch (err) {
      document.getElementById('match-status').innerText = "Load Failed";
      alert(`Could not open document.\n\nGenerated Link Attempted:\n${msUrl}\n\nPlease check your parameter configuration fields.`);
      overlay.style.display = 'none';
    }
  }

  // STEP 4: TRUE LAZY RENDER COMPLIANCE
  async function executeLazyRender(pageNum) {
    if (!currentPdf) return;
    try {
      const section = document.getElementById(`page-sec-${pageNum}`);
      if (!section || section.querySelector('canvas')) return;

      const page = await currentPdf.getPage(pageNum);
      const renderScale = window.devicePixelRatio || 2.0;
      const viewport = page.getViewport({ scale: renderScale });
      
      const pageCanvas = document.createElement('canvas');
      const ctx = pageCanvas.getContext('2d');
      
      pageCanvas.height = viewport.height;
      pageCanvas.width = viewport.width;

      await page.render({ canvasContext: ctx, viewport: viewport }).promise;
      
      const placeholder = document.getElementById(`loader-txt-${pageNum}`);
      if (placeholder) placeholder.remove();
      section.appendChild(pageCanvas);
    } catch (e) {
      console.error(`Dynamic viewport painting error on page ${pageNum}:`, e);
    }
  }

  function jumpToSection(pageIndex, smooth = false) {
    const targetSection = document.getElementById(`page-sec-${pageIndex}`);
    if (targetSection) {
      targetSection.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', block: 'start' });
      updateActiveNavHighlight(pageIndex);
    }
  }

  function updateActiveNavHighlight(pageIndex) {
    document.querySelectorAll('.nav-jump-btn').forEach(btn => btn.classList.remove('active'));
    const activeBtn = document.getElementById(`nav-btn-${pageIndex}`);
    if(activeBtn) {
      activeBtn.classList.add('active');
      activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
  }

  function updateProg(pct, msg) {
    prog.style.width = pct + "%";
    document.getElementById('status-txt').innerText = msg;
  }
</script>
</body>
</html>
