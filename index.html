<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>leakbridge papers</title>
  <script src="https://unpkg.com/tesseract.js@2.1.5/dist/tesseract.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a2a3a;
      --card-bg: #004d4d;
      --text-main: #ffffff;
      --accent-teal: #006666;
      --progress-bg: rgba(74, 90, 106, 1.0);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; letter-spacing: 2px; font-weight:400 }
    .header h2 { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; letter-spacing: 2px; font-weight:200 }

    #video-wrap {
      width: 100%;
      max-width: 340px;
      height: 220px;
      background: var(--card-bg);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    video, #uploaded-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    #uploaded-img { object-fit: contain; background: #0b1926; }

    #aim-box {
      position: absolute;
      width: 85%;
      height: 60px;
      border: 2px solid #ffffff;
      border-radius: 10px;
      pointer-events: none;
      z-index: 5;
      display: none;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 30px;
      width: 100%;
      max-width: 340px;
    }

    .btn-action {
      background: transparent;
      color: white;
      border: 1.5px solid #ffffff;
      padding: 12px 0;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight:300;
      cursor: pointer;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      transition: 0.2s;
    }
    .btn-action:active { background: rgba(255,255,255,0.1); transform: scale(0.96); }

    .output-section { width: 100%; max-width: 340px; }

    .section-group {
      background: rgba(0, 77, 77, 0.4);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border: 3px solid #ffffff;
      position: relative;
    }

    .section-title {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.6;
      margin-bottom: 10px;
      display: block;
    }

    .subject-sub { font-size: 0.8rem; opacity: 0.5; display: block; margin-bottom: 4px; }
    #result-text { font-size: 1.1rem; font-weight: 600; display: block; line-height: 1.3; }

    .pdf-container { display: none; gap: 8px; margin-top: 12px; }

    .pdf-btn {
      flex: 1;
      background: #ffffff;
      color: #004d4d;
      padding: 12px 5px;
      text-align: center;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .toggle-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.6rem;
      cursor: pointer;
      position: absolute;
      right: 15px;
      top: 12px;
    }
    .toggle-btn.off { opacity: 0.4; }

    .progress-container { width: 100%; height: 2px; background: var(--progress-bg); margin-top: 10px; }
    #bar { height: 100%; background: #ffffff; width: 0%; transition: width 0.2s; }

    canvas { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Leakbridge Papers</h1>
    <h2>crazy how the world works</h2>
  </div>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <img id="uploaded-img">
    <div id="aim-box"></div>
  </div>

  <div style="width: 100%; max-width: 340px; margin-bottom: 15px;">
    <input type="text" id="manual-sub" placeholder="Subject Code (e.g. 0580)" 
           style="width: 100%; padding: 14px; border-radius: 8px; border: 2px solid #ffffff; background: rgba(0, 77, 77, 0.3); color: white; text-align: center; font-family: 'Outfit', sans-serif; font-size: 1rem; outline: none;">
  </div>

  <div class="action-row">
    <button class="btn-action" id="cam-btn" onclick="toggleCamera()">Open Camera</button>
    <button class="btn-action" id="main-btn" onclick="scan()">Capture & Scan</button>
    <label class="btn-action" for="file-upload" style="cursor: pointer; display: flex; align-items: center; justify-content: center;">Upload</label>
    <input type="file" id="file-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
    <button class="btn-action" onclick="handleManualPaste()">Paste</button>
  </div>

  <div class="output-section">
    <div class="section-group">
      <span class="section-title">For Rove</span>
      <button class="toggle-btn off" id="copy-toggle" onclick="toggleCopy()">Auto-Copy Off</button>
      <span class="subject-sub" id="subject-display">Subject: ----</span>
      <span id="result-text">Ready...</span>
    </div>

    <div class="section-group">
      <span class="section-title">For Papa Cambridge</span>
      <div id="pdf-container" class="pdf-container">
        <a id="ms-link" class="pdf-btn" target="_blank">MS PDF</a>
        <a id="qp-link" class="pdf-btn" target="_blank">QP PDF</a>
      </div>
    </div>

    <div class="progress-container"><div id="bar"></div></div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const uploadedImg = document.getElementById('uploaded-img');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultEl = document.getElementById('result-text');
    const subjectEl = document.getElementById('subject-display');
    const pdfContainer = document.getElementById('pdf-container');
    const mainBtn = document.getElementById('main-btn');
    const camBtn = document.getElementById('cam-btn');
    const aimBox = document.getElementById('aim-box');
    const bar = document.getElementById('bar');
    const copyToggle = document.getElementById('copy-toggle');
    
    let stream = null, worker = null, isCameraOn = false, currentMode = 'none', autoCopy = false;

    async function initWorker() {
      if (worker) return;
      worker = Tesseract.createWorker({ logger: m => { if(m.status === 'recognizing text') bar.style.width = (m.progress * 100) + '%'; } });
      await worker.load(); await worker.loadLanguage('eng'); await worker.initialize('eng');
      await worker.setParameters({ tessedit_char_whitelist: '0123456789MSWQPFJONmswqpfjon/_ ' });
    }

    function parseCode(text) {
      const manualSub = document.getElementById('manual-sub').value.trim();
      // Keep slashes for the strict regex, clean other junk
      const clean = text.toUpperCase().replace(/[^A-Z0-9_/ ]/g, '').trim();
      
      let pap = "", varnt = "", seas = "", yr = "", sub = manualSub;

      // --- 1. THE "STRICT" SUITE (FIXED FOR OLD TEMPLATES) ---
      const mUnder = clean.match(/(\d{4})?_?([MSW])(\d{2})_(QP|MS)_(\d)(\d)?/);
      const mShort = clean.match(/([MSW])\s*(\d{2})\s*(?:QP|MS)\s*(\d)(\d)?/);
      
      // FIXED mSlash: handles 9709/12/M/J/22 and similar slash formats
      const mSlash = clean.match(/(\d{4})?[\s/]*(\d)([\d])?[\s/]+(M[\s/]*J|O[\s/]*N|F[\s/]*M|S|W|M)[\s/]*(?:20)?(\d{2})/);

      if (mUnder || mShort || mSlash) {
        if (mUnder) {
          if (!sub && mUnder[1]) sub = mUnder[1];
          seas = mUnder[2].toLowerCase();
          yr = mUnder[3];
          pap = mUnder[5];
          varnt = mUnder[6] || "";
        } else if (mShort) {
          seas = mShort[1].toLowerCase();
          yr = mShort[2];
          pap = mShort[3];
          varnt = mShort[4] || "";
        } else if (mSlash) {
          if (!sub && mSlash[1]) sub = mSlash[1];
          pap = mSlash[2];
          varnt = mSlash[3] || "";
          let sStr = mSlash[4].replace(/[\s/]/g, ''); // Clean M/J to MJ
          yr = mSlash[5];
          seas = (sStr==='MJ'||sStr==='S')?'s':(sStr==='ON'||sStr==='W'?'w':'m');
        }
        
        finalizeScan(sub, seas, yr, pap, varnt);
      } 
      else {
        // --- 2. THE "SMART" FALLBACK (UNCHANGED) ---
        runSmartFallback(clean, sub);
      }
    }

    function runSmartFallback(clean, sub) {
      let pap = "", varnt = "", seas = "", yr = "";
      const smartClean = clean.replace(/[/_]/g, ' ').replace(/\s+/g, ' ');

      if (!sub) {
        let subMatch = smartClean.match(/\b([0789]\d{3})\b/);
        sub = subMatch ? subMatch[1] : "9709";
      }

      if (/\b(M\s*J|S)\b/.test(smartClean)) seas = 's';
      else if (/\b(O\s*N|W)\b/.test(smartClean)) seas = 'w';
      else if (/\b(F\s*M|M)\b/.test(smartClean)) seas = 'm';

      let fullYear = smartClean.match(/\b20(\d{2})\b/);
      if (fullYear) yr = fullYear[1];
      else {
        let yrAfterSeas = smartClean.match(/(?:MJ|ON|FM|S|W|M)\s*(\d{2})\b/);
        yr = yrAfterSeas ? yrAfterSeas[1] : "";
      }

      let qpMatch = smartClean.match(/(?:QP|MS|PAPER)\s*(\d{1,2})\b/);
      if (qpMatch) {
        pap = qpMatch[1][0];
        varnt = qpMatch[1].length > 1 ? qpMatch[1][1] : "";
      } else {
        let loose = smartClean.match(/\b\d{1,2}\b/g) || [];
        loose = loose.filter(n => n !== yr);
        if (loose.length > 0) {
          pap = loose[0][0];
          varnt = loose[0].length > 1 ? loose[0][1] : "";
        }
      }

      if (seas && yr && pap) {
        finalizeScan(sub, seas, yr, pap, varnt);
      } else {
        document.getElementById('result-text').textContent = "No valid code found";
        document.getElementById('pdf-container').style.display = 'none';
      }
    }

    function finalizeScan(sub, seas, yr, pap, varnt) {
      const yrInt = parseInt(yr);
      const sName = (seas === 'm') ? "March" : (seas === 's' ? "Summer" : "Winter");
      const fullYearStr = (yrInt > 50 ? "19" : "20") + yr;
      let finalVarnt = (yrInt < 10) ? "" : (varnt || "1");

      const resText = `Paper ${pap}${finalVarnt ? " Variant " + finalVarnt : ""} ${sName} ${fullYearStr}`;
      
      document.getElementById('subject-display').textContent = `Subject: ${sub}`;
      document.getElementById('result-text').textContent = resText;

      const fileSuffix = pap + finalVarnt;
      const msUrlPart = `${sub}_${seas}${yr}_ms_${fileSuffix}`;
      const qpUrlPart = `${sub}_${seas}${yr}_qp_${fileSuffix}`;
      
      document.getElementById('ms-link').href = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${msUrlPart}.pdf`;
      document.getElementById('qp-link').href = `https://pastpapers.papacambridge.com/directories/CAIE/CAIE-pastpapers/upload/${qpUrlPart}.pdf`;
      
      document.getElementById('pdf-container').style.display = 'flex';
      if(autoCopy) navigator.clipboard.writeText(resText);
    }

    async function toggleCamera() {
      if (isCameraOn) {
        if (stream) stream.getTracks().forEach(t => t.stop());
        video.style.display = 'none'; aimBox.style.display = 'none';
        camBtn.textContent = "Open Camera"; isCameraOn = false;
        currentMode = (uploadedImg.style.display === 'block') ? 'image' : 'none';
      } else {
        await initWorker();
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } });
          video.srcObject = stream; video.style.display = 'block';
          uploadedImg.style.display = 'none'; aimBox.style.display = 'block';
          camBtn.textContent = "Close Camera"; isCameraOn = true;
          currentMode = 'camera'; if(video.paused) video.play();
        } catch(e) { alert("Camera Access Denied"); }
      }
    }

    async function scan() {
      if (currentMode === 'none') { alert("Open camera or upload image first"); return; }
      await initWorker();
      if (currentMode === 'camera') video.pause(); 
      mainBtn.disabled = true; mainBtn.textContent = "Scanning...";
      
      const source = currentMode === 'image' ? uploadedImg : video;
      let sw = source.naturalWidth || source.videoWidth;
      let sh = source.naturalHeight || source.videoHeight;
      let sx = 0, sy = 0;
      
      if (currentMode === 'camera') {
        const wrapRatio = 340 / 220;
        let drawW = sw, drawH = sh;
        if ((sw/sh) > wrapRatio) { drawW = sh * wrapRatio; sx = (sw - drawW) / 2; }
        else { drawH = sw / wrapRatio; sy = (sh - drawH) / 2; }
        sx += drawW * 0.075; sy += drawH * 0.36; sw = drawW * 0.85; sh = drawH * 0.27;
      }

      canvas.width = sw * 4; canvas.height = sh * 4;
      ctx.filter = 'grayscale(100%) contrast(350%) brightness(110%)'; 
      ctx.drawImage(source, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
      
      worker.recognize(canvas).then(({ data: { text } }) => {
        parseCode(text);
        mainBtn.disabled = false;
        mainBtn.textContent = currentMode === 'camera' ? "Capture & Scan" : "Scan Image";
        bar.style.width = '0%';
      });
    }

    async function handleManualPaste() {
      try {
        const text = await navigator.clipboard.readText();
        if (text) parseCode(text);
      } catch (e) { alert("Enable clipboard permissions"); }
    }

    function toggleCopy() {
      autoCopy = !autoCopy;
      copyToggle.textContent = autoCopy ? "Auto-Copy On" : "Auto-Copy Off";
      copyToggle.classList.toggle('off', !autoCopy);
    }

    function handleFileUpload(event) {
      if (event.target.files[0]) {
        uploadedImg.src = URL.createObjectURL(event.target.files[0]);
        uploadedImg.onload = () => {
          if (isCameraOn) toggleCamera();
          video.style.display = 'none'; uploadedImg.style.display = 'block';
          currentMode = 'image'; mainBtn.textContent = "Scan Image";
        }
      }
    }
  </script>
</body>
</html>
